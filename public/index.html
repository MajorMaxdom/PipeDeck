<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PipeDeck</title>

  <!-- PWA / Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PipeDeck">
  <meta name="theme-color" content="#0b0b0d">
  <link rel="manifest" href="manifest.json">

  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <img class="logo-icon" src="icon.png" alt="PipeDeck" onerror="this.style.display='none'">
        <span class="logo-text">PIPEDECK <span class="logo-sub">v0.59</span></span>
      </div>
      <div class="scene-controls">
        <span id="scene-btns"></span>
        <button class="zoom-btn" id="scenes-btn" type="button" title="Manage Scenes">▤</button>
      </div>
<div class="zoom-controls">
        <button class="zoom-btn" id="zoom-out" type="button">−</button>
        <span id="zoom-label">100%</span>
        <button class="zoom-btn" id="zoom-in"  type="button">+</button>
        <button class="zoom-btn" id="toggle-inputs"  type="button" title="Hide / Show Hardware Inputs">⬤</button>
        <button class="zoom-btn" id="toggle-outputs" type="button" title="Hide / Show Master Output">◉</button>
        <button class="zoom-btn" id="toggle-media" type="button" title="Media &amp; Sounds">♫</button>
        <button class="zoom-btn" id="settings-btn" type="button" title="Settings">⚙</button>
      </div>
      <div class="status-area">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-label">Connecting…</span>
      </div>
    </header>

    <div id="panel-tabs" class="panel-tabs"></div>

    <main id="main">
      <section class="panel" id="panel-inputs">
        <div class="panel-header">
          <span class="panel-icon">⬤</span>
          <span class="panel-title">HARDWARE INPUT</span>
        </div>
        <div class="strips-scroll">
          <div class="strips" id="strips-sources"></div>
          <div class="ch-labels" id="labels-sources"></div>
        </div>
        <div class="empty-hint" id="empty-sources">No input devices</div>
      </section>

      <div class="resize-handle" id="rh-left"></div>

      <section class="panel panel-flex" id="panel-apps">
        <div class="panel-header">
          <span class="panel-icon">▶</span>
          <span class="panel-title">APPLICATIONS</span>
          <input type="text" id="app-filter" class="app-filter-input" placeholder="filter…" autocomplete="off">
          <button class="zoom-btn" id="show-hidden-apps-btn" type="button" title="Show hidden apps" style="display:none">👁</button>
        </div>
        <div class="batch-bar">
          <button class="batch-btn" id="batch-mute-all"   type="button">MUTE ALL</button>
          <button class="batch-btn" id="batch-unmute-all" type="button">UNMUTE ALL</button>
          <button class="batch-btn" id="batch-reset-all"  type="button">RESET 100%</button>
        </div>
        <div class="strips-scroll">
          <div class="strips" id="strips-sinkinputs"></div>
        </div>
        <div class="empty-hint" id="empty-sinkinputs">No application streams active</div>
      </section>

      <div class="resize-handle" id="rh-right"></div>

      <section class="panel" id="panel-outputs">
        <div class="panel-header">
          <span class="panel-icon">◉</span>
          <span class="panel-title">MASTER OUTPUT</span>
        </div>
        <div class="strips-scroll">
          <div class="strips" id="strips-sinks"></div>
          <div class="ch-labels" id="labels-sinks"></div>
        </div>
        <div class="empty-hint" id="empty-sinks">No output devices</div>
      </section>

      <div class="resize-handle" id="rh-media"></div>

      <section class="panel" id="panel-media">
        <div class="panel-header">
          <span class="panel-icon">♫</span>
          <span class="panel-title">MEDIA &amp; SOUNDS</span>
        </div>
        <div class="media-wrap">
          <div class="media-top" id="media-top">
            <div class="media-info">
              <div class="media-player-name" id="media-player"></div>
              <div class="media-title-text"  id="media-title">Nothing playing</div>
              <div class="media-artist-text" id="media-artist"></div>
            </div>
            <div class="media-btns">
              <button class="media-btn" id="mc-prev" type="button" title="Previous">⏮</button>
              <button class="media-btn" id="mc-play" type="button" title="Play / Pause">▶</button>
              <button class="media-btn" id="mc-next" type="button" title="Next">⏭</button>
            </div>
          </div>
          <div class="media-vresize" id="rh-media-v"></div>
          <div class="media-bottom" id="media-bottom">
            <div class="sb-topbar">
              <span class="sb-label">SOUNDBOARD</span>
              <div class="sb-topbar-right">
                <select id="sb-sink" class="sink-sel"></select>
                <button class="media-btn" id="sb-rescan" type="button" title="Rescan sounds folder">⟳</button>
                <button class="media-btn" id="sb-stop"   type="button" title="Stop sound">■</button>
              </div>
            </div>
            <div class="sb-grid" id="sb-grid">
              <div class="sb-empty">Drop .mp3 / .wav files<br>into <code>sounds/</code></div>
            </div>
          </div>
          <div class="media-vresize" id="rh-macro-v"></div>
          <div class="macro-panel" id="macro-panel">
            <div class="sb-topbar">
              <span class="sb-label">MACROS</span>
              <button class="media-btn" id="macro-add" type="button" title="Add macro">+</button>
            </div>
            <div class="macro-grid" id="macro-grid"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Macro config overlay -->
    <div id="macro-cfg-overlay" class="settings-overlay hidden">
      <div class="settings-modal macro-cfg-modal">
        <div class="settings-hdr">
          <span class="panel-title">CONFIGURE MACRO</span>
          <button class="zoom-btn" id="macro-cfg-close" type="button">✕</button>
        </div>
        <div class="settings-body" id="macro-cfg-body"></div>
      </div>
    </div>

    <!-- Scenes overlay -->
    <div id="scenes-overlay" class="settings-overlay hidden">
      <div class="settings-modal scenes-modal">
        <div class="settings-hdr">
          <span class="panel-title">SCENES</span>
          <button class="zoom-btn" id="scenes-close" type="button">✕</button>
        </div>
        <div class="settings-body" id="scenes-body"></div>
      </div>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" class="settings-overlay hidden">
      <div class="settings-modal">
        <div class="settings-hdr">
          <span class="panel-title">SETTINGS</span>
          <button class="zoom-btn" id="settings-close" type="button">✕</button>
        </div>
        <div class="settings-tabs" id="settings-tabs"></div>
        <div class="settings-body" id="settings-body"></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
